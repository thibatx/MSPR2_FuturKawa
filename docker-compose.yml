# Base de données Postgres pour le dev.
# Lancer : docker compose up -d   (ou npm run db:up)
services:
  postgres:
    image: postgres:16-alpine
    container_name: futurkawa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: FuturKawa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
